<!DOCTYPE html>
<html lang="ko" class="fs-medium">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>태성NCT 생산관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html.fs-small{font-size:13px}
html.fs-medium{font-size:16px}
html.fs-large{font-size:19px}
html.fs-xlarge{font-size:22px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:inherit;background:#111;color:#f0f0f0}
.header{background:#1a1a1a;border-bottom:3px solid #F5A800;padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;flex-wrap:nowrap}
.header-logo{width:44px;height:44px;flex-shrink:0}
.header-title{font-size:1.3em;font-weight:400;color:#F5A800;line-height:1.2;letter-spacing:0.01em}
.header-sub{font-size:0.75em;color:#aaa;margin-top:2px;letter-spacing:0.05em}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.nav{display:flex;gap:4px;background:#111;border-radius:10px;padding:4px}
.ntab{padding:9px 16px;border-radius:8px;border:none;background:transparent;font-size:0.88em;color:#888;cursor:pointer;font-family:inherit;white-space:nowrap;font-weight:400}
.ntab.on{background:#F5A800;color:#111;font-weight:400}
.uname{font-size:0.88em;color:#ccc;font-weight:400}
.badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:0.75em;font-weight:400}
.b-admin{background:#F5A800;color:#111}
.b-worker{background:#1a3a5c;color:#7EC8E3}
.b-ongoing{background:#1a3a5c;color:#7EC8E3}
.b-done{background:#1a3a1a;color:#6FCF6F}
.b-delay{background:#5c1a1a;color:#FF8A80}
.b-new{background:#2a2a5c;color:#B0A8FF}
.app{max-width:860px;margin:0 auto;padding:1rem}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem}
@media(min-width:500px){.stats{grid-template-columns:repeat(4,1fr)}}
.scard{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:14px;padding:16px 18px}
.slabel{font-size:0.82em;color:#888;margin-bottom:5px;font-weight:400}
.sval{font-size:2em;font-weight:400}
.sval.gold{color:#F5A800}.sval.blue{color:#7EC8E3}.sval.green{color:#6FCF6F}.sval.red{color:#FF8A80}
.alert-bar{background:#3a2000;border:2px solid #F5A800;border-radius:12px;padding:13px 16px;margin-bottom:1rem;font-size:0.95em;color:#F5A800;display:flex;align-items:center;gap:10px;font-weight:400;line-height:1.4}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:6px}
.sh-title{font-size:1.05em;font-weight:400;color:#F5A800}
.btn{padding:9px 18px;border-radius:10px;border:1px solid #444;background:#222;font-size:0.88em;cursor:pointer;font-family:inherit;color:#f0f0f0;display:inline-flex;align-items:center;gap:6px;touch-action:manipulation;font-weight:400}
.btn:active{opacity:0.7}
.btn.pri{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.gold{background:#F5A800;color:#111;border-color:#F5A800;font-weight:400}
.btn.grn{background:#1a3a1a;color:#6FCF6F;border-color:#3B6D11;font-weight:400}
.btn.red-btn{color:#FF8A80;border-color:#5c1a1a}
.btn.big{padding:18px 20px;font-size:1.1em;border-radius:14px;width:100%;justify-content:center;font-weight:400}
.ocard{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:14px;padding:15px 17px;margin-bottom:10px;cursor:pointer;touch-action:manipulation}
.ocard:active{opacity:0.75}
.ocard.delay-card{border-left:4px solid #FF8A80}
.otop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.oid{font-weight:400;font-size:1.05em;color:#F5A800;line-height:1.3}
.oname{font-size:0.9em;color:#ccc;margin-top:3px;font-weight:400}
.oclient{font-size:0.82em;color:#888;margin-top:3px}
.pbar{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.ps{flex:1;min-width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:0.62em;font-weight:400}
.ps-d{background:#1a3a1a;color:#6FCF6F;border:1px solid #3B6D11}
.ps-a{background:#1a3a5c;color:#7EC8E3;border:2px solid #378ADD}
.ps-p{background:#1a1a1a;color:#444;border:1px solid #2a2a2a}
.ps-free{background:#3a2000;color:#F5A800;border:2px solid #F5A800}
.ometa{display:flex;gap:10px;margin-top:9px;font-size:0.82em;color:#888;flex-wrap:wrap}
.prog-wrap{background:#2a2a2a;border-radius:4px;height:7px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:#185FA5;border-radius:4px}
.prog-fill.done-fill{background:#3B6D11}
.divider{height:1px;background:#2a2a2a;margin:1rem 0}
.proc-list{display:flex;flex-direction:column;gap:9px}
.pi{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;border-radius:12px;border:1px solid #2a2a2a;background:#1a1a1a}
.pi.a{border-color:#378ADD;background:#0d1f30;border-width:2px}
.pi.d{background:#111;opacity:0.65}
.pi.free{border-color:#F5A800;background:#1a1200;border-width:2px}
.pico{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1em;flex-shrink:0;margin-top:1px;font-weight:400}
.pico.d{background:#1a3a1a;color:#6FCF6F}
.pico.a{background:#1a3a5c;color:#7EC8E3}
.pico.p{background:#1e1e1e;color:#555}
.pico.free-i{background:#3a2000;color:#F5A800}
.pname{font-size:1em;font-weight:400;color:#f0f0f0}
.pworker{font-size:0.82em;color:#888;margin-top:3px}
.pnote{font-size:0.82em;color:#aaa;margin-top:5px;padding:6px 10px;background:#222;border-radius:7px}
.pa{display:flex;gap:5px;align-items:center;margin-left:auto;flex-shrink:0}
.ni{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #444;font-size:0.88em;font-family:inherit;color:#f0f0f0;background:#222;margin-top:6px}
.tl-item{display:flex;gap:10px;align-items:flex-start;font-size:0.88em;margin-bottom:9px}
.tl-dot{width:9px;height:9px;border-radius:50%;margin-top:4px;flex-shrink:0}
.tl-dot.d{background:#6FCF6F}.tl-dot.a{background:#7EC8E3}.tl-dot.p{background:#555}
.tl-text{color:#ccc;line-height:1.5}
.tl-time{font-size:0.79em;color:#666;margin-top:2px}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-row input{flex:1;min-width:0;padding:11px 14px;border-radius:10px;border:1px solid #444;background:#222;font-size:0.88em;font-family:inherit;color:#f0f0f0}
.search-row input::placeholder{color:#555}
.filter-sel{padding:11px 10px;border-radius:10px;border:1px solid #444;background:#222;font-size:0.88em;font-family:inherit;color:#f0f0f0}
.empty{text-align:center;padding:3rem 1rem;color:#555;font-size:0.88em}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);display:flex;align-items:flex-start;justify-content:center;padding:1rem 0.75rem;z-index:100;overflow-y:auto}
.modal{background:#1a1a1a;border-radius:14px;padding:1.35rem;width:100%;max-width:520px;border:1px solid #333;margin:auto}
.mtitle{font-size:1.1em;font-weight:400;margin-bottom:1rem;color:#F5A800}
.fg{margin-bottom:11px}
.fl{font-size:0.82em;color:#888;margin-bottom:4px;display:block;font-weight:400}
.fi{width:100%;padding:11px 13px;border-radius:10px;border:1px solid #444;background:#222;font-size:0.88em;font-family:inherit;color:#f0f0f0}
.fr{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:1rem;border-top:1px solid #2a2a2a}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:#111}
.login-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:18px;padding:2rem;width:100%;max-width:390px}
.login-logo{width:60px;height:60px;margin-bottom:12px}
.login-title{font-size:1.4em;font-weight:400;color:#F5A800;margin-bottom:2px}
.login-sub{font-size:0.82em;color:#888;margin-bottom:1.5rem}
.user-row{display:flex;align-items:center;gap:13px;padding:15px 14px;border-radius:12px;border:1px solid #2a2a2a;margin-bottom:9px;cursor:pointer;touch-action:manipulation;background:#1e1e1e}
.user-row:active{background:#252525}
.user-row.online{border-color:#F5A800;background:#1a1200}
.urow-name{font-size:1.05em;font-weight:400;color:#f0f0f0}
.urow-sub{font-size:0.82em;color:#888;margin-top:3px}
.pin-dots{display:flex;gap:14px;justify-content:center;margin:1.35rem 0}
.pin-dot{width:17px;height:17px;border-radius:50%;border:2px solid #555;background:transparent;transition:all 0.1s}
.pin-dot.filled{background:#F5A800;border-color:#F5A800}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-btn{padding:20px 10px;border-radius:13px;border:1px solid #333;background:#1e1e1e;font-size:1.6em;font-weight:400;cursor:pointer;font-family:inherit;color:#f0f0f0;touch-action:manipulation}
.pin-btn:active{background:#2a2a2a}
.err-msg{font-size:0.82em;color:#FF8A80;text-align:center;margin-top:8px;min-height:20px}
.complete-zone{background:#0d1a0d;border:2px solid #3B6D11;border-radius:14px;padding:1.1rem;margin-bottom:1rem}
.complete-zone-title{font-size:0.95em;font-weight:400;color:#6FCF6F;margin-bottom:11px}
.free-zone{background:#1a1200;border:2px solid #F5A800;border-radius:14px;padding:1.1rem;margin-bottom:1rem}
.free-zone-title{font-size:0.95em;font-weight:400;color:#F5A800;margin-bottom:11px}
.work-card{background:#1e1e1e;border-radius:11px;border:1px solid #333;padding:14px 15px;margin-bottom:9px}
.user-mgmt-row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:11px;border:1px solid #2a2a2a;margin-bottom:9px;background:#1e1e1e}
.section-card{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:14px;padding:15px 17px;margin-bottom:1rem}
.sc-title{font-size:0.79em;font-weight:400;color:#F5A800;margin-bottom:13px;text-transform:uppercase;letter-spacing:0.07em}
.prog-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.pb-label{width:70px;font-size:0.82em;color:#aaa;flex-shrink:0;font-weight:400}
.pb-track{flex:1;background:#222;border-radius:4px;height:9px;overflow:hidden}
.pb-fill{height:100%;border-radius:4px;background:#185FA5}
.pb-fill.pf-done{background:#3B6D11}
.pb-count{font-size:0.79em;color:#888;width:80px;text-align:right;flex-shrink:0}
.fs-btn{padding:11px 20px;border-radius:10px;border:1px solid #444;background:#1e1e1e;font-size:0.9em;cursor:pointer;font-family:inherit;color:#f0f0f0;font-weight:400}
.fs-btn.active{background:#F5A800;color:#111;border-color:#F5A800;font-weight:400}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px}
.spinner{width:34px;height:34px;border:3px solid #333;border-top-color:#F5A800;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(min-width:700px){
  .client-grid{grid-template-columns:repeat(1,1fr) !important}
}
@media(max-width:699px){
  .client-grid{grid-template-columns:repeat(1,1fr) !important}
}

@media(max-width:600px){
  .header{padding:8px 12px;gap:6px}
  .header-logo{width:32px;height:32px}
  .header-title{font-size:1em}
  .header-sub{display:none}
  .nav .ntab{padding:5px 7px;font-size:0.75em}
  .uname{font-size:0.82em}
}

.login-right{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.login-right-bg{position:absolute;inset:0;background:
  repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(245,168,0,0.03) 40px,rgba(245,168,0,0.03) 41px),
  repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(245,168,0,0.03) 40px,rgba(245,168,0,0.03) 41px),
  radial-gradient(ellipse at 30% 50%,rgba(245,168,0,0.08) 0%,transparent 60%),
  radial-gradient(ellipse at 80% 20%,rgba(126,200,227,0.06) 0%,transparent 50%),
  linear-gradient(135deg,#0d0d0d 0%,#1a1a1a 50%,#0d0d0d 100%)}
.login-right-content{position:relative;z-index:1;text-align:center;padding:2rem}
.login-right-icon{font-size:5em;opacity:0.15;margin-bottom:1.5rem;display:block}
.login-right-title{font-size:2em;color:rgba(245,168,0,0.4);margin-bottom:1rem;letter-spacing:0.1em}
.login-right-steps{display:flex;flex-direction:column;gap:18px;margin-top:2rem}
.login-right-step{display:flex;align-items:center;gap:16px;opacity:0.25}
.login-right-step-num{width:36px;height:36px;border-radius:50%;border:1px solid #F5A800;display:flex;align-items:center;justify-content:center;font-size:0.9em;color:#F5A800;flex-shrink:0}
.login-right-step-text{text-align:left}
.login-right-step-label{font-size:0.85em;color:#F5A800}
.login-right-step-sub{font-size:0.75em;color:#888;margin-top:2px}
@media(max-width:700px){.login-right{display:none}.login-card{max-width:100%;border-radius:0}}
</style>
</head>

const STEPS=["도면작업","레이저","절곡","용접","후가공","도장/도금","출하"];
const FREE_STEP=4;
const DEF_USERS={admin:{id:"admin",pw:"admin1234",name:"관리자",role:"admin",stepIdx:-1},w0:{id:"w0",name:"김민준",role:"worker",pin:"1111",stepIdx:0},w1:{id:"w1",name:"이서연",role:"worker",pin:"2222",stepIdx:1},w2:{id:"w2",name:"박지호",role:"worker",pin:"3333",stepIdx:2},w3:{id:"w3",name:"최유나",role:"worker",pin:"4444",stepIdx:3},w4:{id:"w4",name:"정태양",role:"worker",pin:"5555",stepIdx:5},w5:{id:"w5",name:"한수진",role:"worker",pin:"6666",stepIdx:6}};
let users={},orders={},sessions={};
let sess=null,tab="dash",fSt="all",sq="",lStep="select",lTarget=null,pinBuf="";
let fontSize=localStorage.getItem("fontSize")||"medium";
applyFont(fontSize);
function applyFont(fs){document.documentElement.className="fs-"+fs;fontSize=fs;localStorage.setItem("fontSize",fs);}
function td(){return new Date().toISOString().split("T")[0];}
function dd(){const d=new Date();d.setDate(d.getDate()+14);return d.toISOString().split("T")[0];}
function dl(due){return Math.ceil((new Date(due)-new Date())/864e5);}
function pct(o){return o.steps?Math.round(o.steps.filter(s=>s===2).length/STEPS.length*100):0;}
function nextId(){const nums=Object.values(orders).map(o=>{const m=o.id&&o.id.match(/\d+$/);return m?parseInt(m[0]):0;});return`${new Date().getFullYear()}-${String((nums.length?Math.max(...nums):80)+1).padStart(3,"0")}`;}
function wList(){return Object.values(users).filter(u=>u.role==="worker");}
function wNames(){return wList().map(u=>u.name);}
const isAdmin=()=>sess&&sess.role==="admin";
const wIdx=()=>sess&&sess.role==="worker"?sess.stepIdx:-1;
const wName=()=>sess?sess.name:"";
function gSt(o){if(!o.steps)return"new";if(o.steps.every(s=>s===2))return"done";if(new Date(o.due)<new Date())return"delay";if(o.steps.findIndex(s=>s===1)===-1&&o.steps[0]===0)return"new";return"ongoing";}
const stL={done:"완료",delay:"지연",new:"신규",ongoing:"진행중"};
const stC={done:"b-done",delay:"b-delay",new:"b-new",ongoing:"b-ongoing"};
function curStep(o){if(!o.steps)return"시작 전";const i=o.steps.findIndex(s=>s===1);if(i>=0)return STEPS[i];const j=o.steps.lastIndexOf(2);if(j===STEPS.length-1)return"출하 완료";if(j>=0)return STEPS[j+1]+" 대기";return"시작 전";}
const mySessionId="sess_"+Math.random().toString(36).slice(2);
onValue(ref(db,"sessions"),snap=>{sessions=snap.val()||{};});
onValue(ref(db,"users"),snap=>{const val=snap.val();if(!val){set(ref(db,"users"),DEF_USERS);users={...DEF_USERS};}else users=val;if(sess){const u=Object.values(users).find(u=>u.id===sess.id);if(u)sess={...u};}render();});
onValue(ref(db,"orders"),snap=>{orders=snap.val()||{};render();});
function saveOrder(key,o){set(ref(db,`orders/${key}`),o);}
function saveUser(key,u){set(ref(db,`users/${key}`),u);}
function deleteOrder(key){remove(ref(db,`orders/${key}`));}
function deleteUser(key){remove(ref(db,`users/${key}`));}
function getOrderKey(id){return Object.keys(orders).find(k=>orders[k]&&orders[k].id===id);}
function setSession(uid){set(ref(db,`sessions/${uid}`),{sessionId:mySessionId,at:Date.now()});}
function clearSession(uid){remove(ref(db,`sessions/${uid}`));}

function hdr(){
  return `<div class="header">
  <img class="header-logo" src="${LOGO}" alt="TS">
  <div><div class="header-title">태성NCT</div><div class="header-sub">생산관리현황</div></div>
  <div class="header-right">
    ${isAdmin()?`<div class="nav">
      <button class="ntab ${tab==="dash"?"on":""}" onclick="sTab('dash')">대시보드</button>
      <button class="ntab ${tab==="list"?"on":""}" onclick="sTab('list')">수주</button>
      <button class="ntab ${tab==="users"?"on":""}" onclick="sTab('users')">계정</button>
      <button class="ntab ${tab==="settings"?"on":""}" onclick="sTab('settings')">설정</button>
    </div>`:`<div class="nav">
      <button class="ntab ${tab==="dash"?"on":""}" onclick="sTab('dash')">내 공정</button>
      <button class="ntab ${tab==="settings"?"on":""}" onclick="sTab('settings')">설정</button>
    </div>`}
    <div style="display:flex;align-items:center;gap:8px">
      <span class="uname">${sess.name}</span>
      <button class="btn" onclick="logout()" style="padding:6px 12px;font-size:0.79em">로그아웃</button>
    </div>
  </div>
</div>`;}

function render(){
  if(!sess){renderLogin();return;}
  document.getElementById("root").innerHTML=hdr()+`<div class="app"><div id="v-main"></div><div id="ov"></div></div>`;
  if(tab==="settings")renderSettings();
  else if(!isAdmin())renderWorker();
  else if(tab==="dash")renderDash();
  else if(tab==="list")renderList();
  else renderUsers();
}
function sTab(t){tab=t;render();}
function logout(){if(sess&&sess.role!=="admin")clearSession(sess.id);sess=null;lStep="select";lTarget=null;pinBuf="";render();}

function renderSettings(){
  document.getElementById("v-main").innerHTML=`
  <div class="section-card">
    <div class="sc-title">글자 크기</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
      <button class="fs-btn ${fontSize==="small"?"active":""}" onclick="changeFont('small')">작게</button>
      <button class="fs-btn ${fontSize==="medium"?"active":""}" onclick="changeFont('medium')">보통</button>
      <button class="fs-btn ${fontSize==="large"?"active":""}" onclick="changeFont('large')">크게</button>
      <button class="fs-btn ${fontSize==="xlarge"?"active":""}" onclick="changeFont('xlarge')">매우 크게</button>
    </div>
    <div style="font-size:0.95em;color:#888">미리보기: 판금 제조 생산 진행 관리</div>
  </div>
  ${!isAdmin()?`<div class="section-card">
    <div class="sc-title">내 PIN 변경</div>
    <div class="fg"><label class="fl">현재 PIN</label><input class="fi" id="op" type="password" maxlength="4" placeholder="현재 PIN 4자리"></div>
    <div class="fg"><label class="fl">새 PIN</label><input class="fi" id="np" type="password" maxlength="4" placeholder="새 PIN 4자리"></div>
    <div class="fg"><label class="fl">새 PIN 확인</label><input class="fi" id="np2" type="password" maxlength="4" placeholder="새 PIN 확인"></div>
    <div class="err-msg" id="pe"></div>
    <button class="btn gold" style="margin-top:6px" onclick="changePin()">PIN 변경</button>
  </div>`:`<div class="section-card">
    <div class="sc-title">관리자 비밀번호 변경</div>
    <div class="fg"><label class="fl">현재 비밀번호</label><input class="fi" id="op" type="password"></div>
    <div class="fg"><label class="fl">새 비밀번호</label><input class="fi" id="np" type="password"></div>
    <div class="fg"><label class="fl">새 비밀번호 확인</label><input class="fi" id="np2" type="password"></div>
    <div class="err-msg" id="pe"></div>
    <button class="btn gold" style="margin-top:6px" onclick="changePin()">비밀번호 변경</button>
  </div>`}`;}

window.changeFont=(fs)=>{applyFont(fs);renderSettings();}
window.changePin=()=>{
  const op=document.getElementById("op").value,np=document.getElementById("np").value,np2=document.getElementById("np2").value,e=document.getElementById("pe");
  if(isAdmin()){
    if(op!==users.admin.pw){e.textContent="현재 비밀번호가 틀렸습니다.";return;}
    if(np.length<4){e.textContent="4자 이상 입력하세요.";return;}
    if(np!==np2){e.textContent="새 비밀번호가 일치하지 않습니다.";return;}
    saveUser("admin",{...users.admin,pw:np});alert("비밀번호가 변경되었습니다.");alert("PIN이 변경되었습니다.");
  }else{
    if(!/^\d{4}$/.test(op)||op!==sess.pin){e.textContent="현재 PIN이 틀렸습니다.";return;}
    if(!/^\d{4}$/.test(np)){e.textContent="PIN은 숫자 4자리여야 합니다.";return;}
    if(np!==np2){e.textContent="새 PIN이 일치하지 않습니다.";return;}
    const key=Object.keys(users).find(k=>users[k].id===sess.id);
    if(key){saveUser(key,{...users[key],pin:np});sess={...sess,pin:np};}
    alert("PIN이 변경되었습니다.");
  }
}

  document.getElementById("root").innerHTML=`<div class="login-wrap"><div class="login-card">${lStep==="select"?renderLSel():lStep==="pin"?renderLPin():renderLAdmin()}</div></div>`;}

  return`<div style="display:flex;align-items:center;gap:14px;margin-bottom:1.35rem">
    <img class="login-logo" src="${LOGO}" alt="TS">
    <div><div class="login-title">태성NCT</div><div style="font-size:0.82em;color:#888;margin-top:2px;letter-spacing:0.05em">생산관리현황</div></div>

    <div style="flex:1">
      <div style="font-size:1.2em;color:#f0f0f0;display:flex;align-items:center;gap:8px">${w.name}${on?` <span style="font-size:0.65em;color:#F5A800;background:#3a2000;padding:2px 8px;border-radius:10px">접속중</span>`:""}</div>
      <div style="font-size:1em;color:${bc};margin-top:4px">${STEPS[w.stepIdx]} 담당</div>
    </div>
    <div style="width:44px;height:44px;color:${bc};opacity:0.5;flex-shrink:0">${STEP_ICONS[w.stepIdx]||""}</div>

function renderLAdmin(){
  return`<div style="cursor:pointer;margin-bottom:1.25rem;color:#888;font-size:0.9em;font-weight:400" onclick="back()">← 뒤로</div>

    <div style="font-size:1.4em;font-weight:400;color:#F5A800">${w.name}</div>

    ${on?`<div style="font-size:0.85em;color:#F5A800;margin-top:10px;background:#3a2000;padding:9px 13px;border-radius:9px;font-weight:400">⚠ 다른 기기에서 접속 중입니다</div>`:""}

  </div>

  <div class="err-msg" id="perr"></div>`;}

window.selAdmin=()=>{lStep="admin";renderLogin();}
window.selWorker=(id)=>{lTarget=id;pinBuf="";lStep="pin";renderLogin();}
window.back=()=>{lStep="select";lTarget=null;pinBuf="";renderLogin();}
window.subAdmin=()=>{const id=document.getElementById("aid").value.trim(),pw=document.getElementById("apw").value,u=users.admin;if(u&&id===u.id&&pw===u.pw){sess={...u};tab="dash";render();}else document.getElementById("aerr").textContent="아이디 또는 비밀번호가 틀렸습니다.";}
window.pinP=(n)=>{if(n==="")return;if(n==="⌫"){pinBuf=pinBuf.slice(0,-1);updDots();return;}if(pinBuf.length>=4)return;pinBuf+=String(n);updDots();if(pinBuf.length===4){setTimeout(()=>{const w=users[lTarget];if(w&&pinBuf===w.pin){setSession(w.id);sess={...w};render();}else{const e=document.getElementById("perr");if(e)e.textContent="PIN이 틀렸습니다.";pinBuf="";updDots();}},120);}};
function updDots(){document.querySelectorAll(".pin-dot").forEach((d,i)=>d.classList.toggle("filled",i<pinBuf.length));}
window.logout=logout;window.sTab=sTab;

function renderWorker(){
  const el=document.getElementById("v-main"),si=wIdx(),oList=Object.values(orders);
  const myActive=oList.filter(o=>o.steps&&o.steps[si]===1);
  const myDone=oList.filter(o=>o.steps&&o.steps[si]===2);
  const freeActive=oList.filter(o=>o.steps&&o.steps[FREE_STEP]===1);
  const near=myActive.filter(o=>dl(o.due)>=0&&dl(o.due)<=3);
  el.innerHTML=`
  <div class="stats">
    <div class="scard"><div class="slabel">${STEPS[si]} 진행</div><div class="sval blue">${myActive.length}</div></div>
    <div class="scard"><div class="slabel">완료</div><div class="sval green">${myDone.length}</div></div>
    <div class="scard"><div class="slabel">납기 임박</div><div class="sval ${near.length?"red":"green"}">${near.length}</div></div>
    <div class="scard"><div class="slabel">전체 수주</div><div class="sval gold">${oList.length}</div></div>
  </div>
  ${near.length?`<div class="alert-bar">🔔 납기 임박: <strong>${near.map(o=>o.id).join(", ")}</strong></div>`:""}
  ${myActive.length?`<div class="complete-zone"><div class="complete-zone-title">▶ 내 공정 진행 중 — ${STEPS[si]}</div>${myActive.map(o=>wCard(o,si,"my")).join("")}</div>`:`<div class="empty" style="font-size:1em">현재 진행 중인 ${STEPS[si]} 작업이 없습니다</div>`}
  ${freeActive.length?`<div class="free-zone"><div class="free-zone-title">🔧 후가공 대기 — 누구나 완료 가능 (${freeActive.length}건)</div>${freeActive.map(o=>wCard(o,FREE_STEP,"free")).join("")}</div>`:""}
  ${myDone.length?`<div class="sh" style="margin-top:0.75rem"><div class="sh-title" style="color:#555;font-size:0.9em">완료 (${myDone.length}건)</div></div>${myDone.map(o=>`<div class="ocard" style="cursor:default;opacity:0.45"><div class="otop"><div><div class="oname">${o.name}</div></div><span class="badge b-done">완료</span></div></div>`).join("")}`:""}`;}

function wCard(o,si,type){return`<div class="work-card" style="border-color:${type==="free"?"#F5A800":"#3B6D11"}">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px">
    <div>
      <div style="font-size:1.1em;font-weight:400;color:#F5A800">${o.id}</div>
      <div style="font-size:0.9em;color:#ccc;margin-top:3px">${o.name} · ${o.client} · ${o.qty}개</div>
      <div style="font-size:0.82em;color:#888;margin-top:3px">납기 ${o.due}</div>
    </div>
    ${dl(o.due)<=3?`<span class="badge b-delay" style="font-size:0.88em">D-${Math.max(0,dl(o.due))}</span>`:""}
  </div>
  ${o.notes&&o.notes[si]?`<div style="font-size:0.85em;color:#aaa;margin-bottom:11px;padding:8px 11px;background:#222;border-radius:8px">📝 ${o.notes[si]}</div>`:""}
  <button class="btn ${type==="free"?"gold":"grn"} big" onclick="wComplete('${o.id}',${si})">✓ ${STEPS[si]} 완료 처리</button>
</div>`;}

window.wComplete=(oid,si)=>{const key=getOrderKey(oid);const o=orders[key];if(!o||o.steps[si]!==1)return;const u={...o,steps:[...o.steps],history:[...(o.history||[])]};u.steps[si]=2;u.history.push({t:td(),msg:`${STEPS[si]} 완료 (${wName()})`});if(si+1<STEPS.length){u.steps[si+1]=1;u.history.push({t:td(),msg:`${STEPS[si+1]} 시작`});}saveOrder(key,u);}

function renderDash(){
  const el=document.getElementById("v-main"),oList=Object.values(orders),total=oList.length;
  const done=oList.filter(o=>gSt(o)==="done").length,delay=oList.filter(o=>gSt(o)==="delay").length,ongoing=oList.filter(o=>gSt(o)==="ongoing").length;
  const near=oList.filter(o=>{const d=dl(o.due);return d>=0&&d<=3&&gSt(o)!=="done";});
  const clientMap={};
  oList.forEach(o=>{const c=o.client||"미정";if(!clientMap[c])clientMap[c]=[];clientMap[c].push(o);});
  const CLIENT_BG=["#1a1a2e","#1a2a1a","#2a1a1a","#1a1a2a","#2a1a2a","#1a2a2a","#2a2a1a","#1e1a10","#101e1e","#1e101e"];
  const CLIENT_BC=["#7EC8E3","#6FCF6F","#FF8A80","#B0A8FF","#F5A800","#5DD8D8","#E8C86F","#FFB347","#98FB98","#DDA0DD"];
  const clientKeys=Object.keys(clientMap);
  el.innerHTML=`
  <div class="stats">
    <div class="scard"><div class="slabel">전체 수주</div><div class="sval gold">${total}</div></div>
    <div class="scard"><div class="slabel">진행 중</div><div class="sval blue">${ongoing}</div></div>
    <div class="scard"><div class="slabel">완료</div><div class="sval green">${done}</div></div>
    <div class="scard"><div class="slabel">지연</div><div class="sval red">${delay}</div></div>
  </div>
  ${near.length?`<div class="alert-bar" style="cursor:pointer;flex-direction:column;align-items:flex-start;gap:6px" onclick="showNearModal()"><div>🔔 납기 임박 (D-3 이내) — 탭하여 확인</div>${near.map(o=>`<div style="font-size:0.9em;padding-left:4px">· <strong>${o.client}</strong> / ${o.name} <span style="color:#aaa;font-size:0.85em">${o.due}</span></div>`).join("")}</div>`:""}
  <div class="sh" style="margin-bottom:14px"><div class="sh-title">업체별 수주 현황</div></div>
  ${clientKeys.length===0?'<div class="empty">등록된 수주가 없습니다</div>':clientKeys.map((c,ci)=>{
    const bg=CLIENT_BG[ci%CLIENT_BG.length];
    const bc=CLIENT_BC[ci%CLIENT_BC.length];
    const items=clientMap[c];
    return`<div style="background:${bg};border:1px solid ${bc}44;border-radius:14px;padding:14px 16px;margin-bottom:14px">
      <div style="font-size:1.1em;color:${bc};margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid ${bc}33">${c} <span style="font-size:0.75em;color:#888;margin-left:6px">${items.length}건</span></div>
      <div class="client-grid" style="display:grid;gap:8px">
        ${items.map(o=>{
          const st=gSt(o),d=dl(o.due);
          return`<div style="background:#111;border-radius:10px;padding:10px 10px;border:1px solid ${st==="delay"?"#FF8A80":st==="done"?"#3B6D11":"#2a2a2a"};cursor:pointer" onclick="openDetail('${o.id}')">
            
            <div style="font-size:0.95em;color:#f0f0f0;margin-bottom:8px;line-height:1.3">${o.name}</div>
            <div class="pbar" style="margin-bottom:8px;gap:1px">${STEPS.map((s,i)=>{const c2=o.steps&&o.steps[i]===2?"ps-d":o.steps&&o.steps[i]===1?(i===FREE_STEP?"ps-free":"ps-a"):"ps-p";return`<div class="ps ${c2}" title="${s}">${s}</div>`;}).join("")}</div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span class="badge ${stC[st]}" style="font-size:0.72em">${stL[st]}</span>
              <span style="font-size:0.75em;color:#888">${o.due}</span>
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }).join("")}`;
}

  const near=Object.values(orders).filter(o=>{const d=dl(o.due);return d>=0&&d<=3&&gSt(o)!=="done";});
  showOv(`<div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div class="mtitle" style="margin-bottom:0">🔔 납기 임박 수주</div>

          <div style="font-size:0.88em;color:#ccc;margin-top:2px">${o.name}</div>

function renderList(){
  const el=document.getElementById("v-main");
  let list=Object.values(orders).filter(o=>{if(fSt!=="all"&&gSt(o)!==fSt)return false;if(sq){const q=sq.toLowerCase();return(o.id||"").toLowerCase().includes(q)||(o.client||"").toLowerCase().includes(q)||(o.name||"").toLowerCase().includes(q);}return true;});
  el.innerHTML=`
  <div class="search-row">
    <input placeholder="수주번호 · 거래처 · 품명" value="${sq}" oninput="sq=this.value;renderList()">
    <select class="filter-sel" onchange="fSt=this.value;renderList()">
      <option value="all">전체</option>
      <option value="new" ${fSt==="new"?"selected":""}>신규</option>
      <option value="ongoing" ${fSt==="ongoing"?"selected":""}>진행중</option>
      <option value="delay" ${fSt==="delay"?"selected":""}>지연</option>
      <option value="done" ${fSt==="done"?"selected":""}>완료</option>
    </select>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="font-size:0.85em;color:#666">${list.length}/${Object.keys(orders).length}건</div>
    <button class="btn gold" onclick="openAdd()">+ 수주 등록</button>
  </div>
  ${list.length===0?`<div class="empty">해당 조건의 수주가 없습니다</div>`:list.sort((a,b)=>(b.id||"").localeCompare(a.id||"")).map(o=>cardH(o)).join("")}`;}

function cardH(o){const st=gSt(o),d=dl(o.due);return`<div class="ocard ${st==="delay"?"delay-card":""}" onclick="openDetail('${o.id}')">
  <div class="otop">
    <div><div class="oname">${o.name}</div><div class="oclient">${o.client}</div></div>
    <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
      <span class="badge ${stC[st]}">${stL[st]}</span>
      ${d<=3&&st!=="done"?`<span class="badge b-delay">D-${Math.max(0,d)}</span>`:""}
    </div>
  </div>
  <div class="pbar">${STEPS.map((s,i)=>{const c=o.steps&&o.steps[i]===2?"ps-d":o.steps&&o.steps[i]===1?(i===FREE_STEP?"ps-free":"ps-a"):"ps-p";return`<div class="ps ${c}" title="${s}">${s}</div>`;}).join('<span style="font-size:0.55em;color:#333">›</span>')}</div>
  <div style="margin-top:8px"><div class="prog-wrap"><div class="prog-fill ${pct(o)===100?"done-fill":""}" style="width:${pct(o)}%"></div></div></div>
  <div class="ometa"><span>${o.qty}개</span><span>납기 ${o.due}</span><span>${curStep(o)}</span><span>${pct(o)}%</span></div>
</div>`;}

window.openDetail=(id)=>{
  const o=Object.values(orders).find(x=>x.id===id);if(!o)return;
  const st=gSt(o);
  showOv(`<div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">
      <div><div style="font-size:1.15em;font-weight:400;color:#F5A800">${o.id}</div><div style="font-size:0.9em;color:#ccc;margin-top:3px">${o.name}</div><div style="font-size:0.82em;color:#888;margin-top:3px">${o.client} · ${o.qty}개</div></div>
      <button class="btn" onclick="closeOv()" style="padding:5px 11px;font-size:1em">✕</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <span class="badge ${stC[st]}">${stL[st]}</span>
      <span style="font-size:0.82em;color:#888">납기 ${o.due}</span>
      ${o.post?`<span style="font-size:0.82em;color:#888">후가공: ${o.post}</span>`:""}
      ${o.coat?`<span style="font-size:0.82em;color:#888">도장: ${o.coat}</span>`:""}
    </div>
    <div style="margin-bottom:10px"><div class="prog-wrap" style="height:9px"><div class="prog-fill ${pct(o)===100?"done-fill":""}" style="width:${pct(o)}%"></div></div><div style="font-size:0.82em;color:#888;margin-top:4px">${pct(o)}% 완료</div></div>
    <div class="divider"></div>
    <div style="font-size:0.9em;font-weight:400;color:#F5A800;margin-bottom:10px">공정 진행</div>
    <div class="proc-list">${renderPL(o)}</div>
    <div class="divider"></div>
    <div style="font-size:0.9em;font-weight:400;color:#F5A800;margin-bottom:10px">진행 이력</div>
    <div>${(o.history||[]).slice().reverse().map(h=>`<div class="tl-item"><div class="tl-dot ${h.msg.includes("시작")?"a":h.msg.includes("완료")||h.msg.includes("납품")?"d":"p"}"></div><div><div class="tl-text">${h.msg}</div><div class="tl-time">${h.t}</div></div></div>`).join("")}</div>
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between">
      <button class="btn red-btn" onclick="delOrderUI('${o.id}')">🗑 삭제</button>
      <div style="display:flex;gap:8px"><button class="btn" onclick="openEdit('${o.id}')">✏ 수정</button><button class="btn" onclick="closeOv()">닫기</button></div>
    </div>
  </div>`);}

function renderPL(o){return STEPS.map((s,i)=>{
  const sv=o.steps?o.steps[i]:0,ic=sv===2?"d":sv===1?"a":"p",piC=sv===2?"d":sv===1?"a":"",wk=(o.workers&&o.workers[i])||"미지정",isFree=i===FREE_STEP;
  return`<div class="pi ${piC} ${isFree&&sv===1?"free":""}">
    <div class="pico ${isFree&&sv===1?"free-i":ic}">${sv===2?"✓":sv===1?(isFree?"🔧":"▶"):(i+1)}</div>
    <div style="flex:1;min-width:0">
      <div class="pname">${s}${isFree?` <span style="font-size:0.65em;color:#F5A800;background:#3a2000;padding:1px 7px;border-radius:8px">누구나</span>`:""}</div>
      ${!isFree?`<div class="pworker">담당: <select style="font-size:0.82em;border:none;background:transparent;font-family:inherit;color:#888;cursor:pointer" onchange="setWk('${o.id}',${i},this.value)"><option value="미지정" ${wk==="미지정"?"selected":""}>미지정</option>${wNames().map(w=>`<option value="${w}" ${w===wk?"selected":""}>${w}</option>`).join("")}</select></div>`:`<div class="pworker" style="color:#F5A800;font-weight:400">누구나 완료 가능</div>`}
      ${o.notes&&o.notes[i]?`<div class="pnote">📝 ${o.notes[i]}</div>`:""}
      <input class="ni" id="ni-${o.id}-${i}" placeholder="메모 입력..." value="${o.notes&&o.notes[i]||""}" style="display:none" oninput="saveN('${o.id}',${i},this.value)">
    </div>
    <div class="pa">
      ${sv!==2?`<button class="btn ${sv===1?"pri":""}" style="padding:8px 13px;font-size:0.88em" onclick="adv('${o.id}',${i})">${sv===1?"완료":"시작"}</button>`:`<span style="font-size:0.88em;color:#6FCF6F;font-weight:400">완료</span>`}
      <button class="btn" style="padding:7px 10px" onclick="togN('${o.id}',${i})">✏</button>
    </div>
  </div>`;}).join("");}

window.adv=(id,i)=>{const key=getOrderKey(id);const o=orders[key];if(!o)return;const u={...o,steps:[...(o.steps||STEPS.map(()=>0))],history:[...(o.history||[])]};if(u.steps[i]===0){const p=u.steps.findIndex(s=>s===1);if(p>=0&&p!==i)return;u.steps[i]=1;u.history.push({t:td(),msg:`${STEPS[i]} 시작 (관리자)`});}else if(u.steps[i]===1){u.steps[i]=2;u.history.push({t:td(),msg:`${STEPS[i]} 완료 (관리자)`});if(i+1<STEPS.length){u.steps[i+1]=1;u.history.push({t:td(),msg:`${STEPS[i+1]} 시작`});}}saveOrder(key,u);setTimeout(()=>openDetail(id),400);}
window.setWk=(id,i,v)=>{const key=getOrderKey(id);const o=orders[key];if(!o)return;const u={...o,workers:[...(o.workers||STEPS.map(()=>"미지정"))]};u.workers[i]=v;saveOrder(key,u);}
window.saveN=(id,i,v)=>{const key=getOrderKey(id);const o=orders[key];if(!o)return;const notes=[...(o.notes||STEPS.map(()=>""))];notes[i]=v;saveOrder(key,{...o,notes});}
window.togN=(id,i)=>{const inp=document.getElementById(`ni-${id}-${i}`);if(!inp)return;inp.style.display=inp.style.display==="none"?"":"none";}
window.delOrderUI=(id)=>{if(!confirm("삭제하시겠습니까?"))return;const key=getOrderKey(id);deleteOrder(key);closeOv();}

window.openAdd=()=>{showOv(`<div class="modal">
  <div class="mtitle">수주 등록</div>
  <div class="fg"><label class="fl">거래처</label><input class="fi" id="ai-cl" placeholder="거래처명"></div>
  <div class="fg"><label class="fl">품명</label><input class="fi" id="ai-nm" placeholder="품명 또는 설명"></div>
  <div class="fg"><label class="fl">납기일</label><input class="fi" id="ai-du" type="date" value="${dd()}"></div>
  <div class="fg"><label class="fl">도면작업 담당자</label><select class="fi" id="ai-wk"><option value="미지정">미지정</option><option>김오기</option><option>안성민</option><option>박은희</option></select></div>
  <div class="mfoot"><button class="btn" onclick="closeOv()">취소</button><button class="btn gold" onclick="subAdd()">+ 등록</button></div>
</div>`);}

window.subAdd=()=>{const cl=document.getElementById("ai-cl").value.trim(),nm=document.getElementById("ai-nm").value.trim(),du=document.getElementById("ai-du").value,wk=document.getElementById("ai-wk").value;if(!cl||!nm){alert("거래처, 품명은 필수입니다.");return;}const id=nextId();const key="order_"+Date.now();set(ref(db,`orders/${key}`),{id,client:cl,name:nm,qty:1,due:du,post:"",coat:"",steps:[1,0,0,0,0,0,0],notes:["","","","","","",""],workers:[wk,"미지정","미지정","미지정","미지정","미지정","미지정"],created:td(),history:[{t:td(),msg:"수주 등록"}]});closeOv();}

window.openEdit=(id)=>{const o=Object.values(orders).find(x=>x.id===id);if(!o)return;closeOv();setTimeout(()=>showOv(`<div class="modal">
  <div class="mtitle">수주 수정 — ${o.id}</div>
  <div class="fr"><div class="fg"><label class="fl">거래처</label><input class="fi" id="ei-cl" value="${o.client||""}"></div><div class="fg"><label class="fl">품명</label><input class="fi" id="ei-nm" value="${o.name||""}"></div></div>
  <div class="fr"><div class="fg"><label class="fl">수량</label><input class="fi" id="ei-qt" type="number" value="${o.qty||1}"></div><div class="fg"><label class="fl">납기일</label><input class="fi" id="ei-du" type="date" value="${o.due||""}"></div></div>
  <div class="fr"><div class="fg"><label class="fl">후가공</label><input class="fi" id="ei-po" value="${o.post||""}"></div><div class="fg"><label class="fl">도장/도금</label><input class="fi" id="ei-co" value="${o.coat||""}"></div></div>
  <div class="mfoot"><button class="btn" onclick="closeOv()">취소</button><button class="btn gold" onclick="subEdit('${o.id}')">✓ 저장</button></div>
</div>`),50);}

window.subEdit=(id)=>{const key=getOrderKey(id);const o=orders[key];if(!o)return;saveOrder(key,{...o,client:document.getElementById("ei-cl").value.trim()||o.client,name:document.getElementById("ei-nm").value.trim()||o.name,qty:parseInt(document.getElementById("ei-qt").value)||o.qty,due:document.getElementById("ei-du").value||o.due,post:document.getElementById("ei-po").value.trim(),coat:document.getElementById("ei-co").value.trim()});closeOv();}

function renderUsers(){const ws=wList();document.getElementById("v-main").innerHTML=`
  <div class="sh"><div class="sh-title">계정 관리</div><button class="btn gold" onclick="openAddWk()">+ 담당자 추가</button></div>
  <div class="section-card"><div class="sc-title">관리자</div><div class="user-mgmt-row"><div style="flex:1"><div style="font-size:1.05em;font-weight:400">관리자</div><div style="font-size:0.82em;color:#888;margin-top:3px">ID: admin · 전체 권한 · 중복 로그인 허용</div></div></div></div>
  <div class="section-card"><div class="sc-title">공정 담당자 (${ws.length}명)</div>
  ${ws.map(w=>{const on=sessions[w.id]&&sessions[w.id].sessionId;return`<div class="user-mgmt-row"><div style="flex:1"><div style="font-size:1.05em;font-weight:400;display:flex;align-items:center;gap:8px">${w.name}${on?` <span style="font-size:0.7em;color:#F5A800;background:#3a2000;padding:2px 8px;border-radius:10px">접속중</span>`:""}</div><div style="font-size:0.82em;color:#888;margin-top:3px">${STEPS[w.stepIdx]} 담당 · PIN: ${"●".repeat(w.pin.length)}</div></div><div style="display:flex;gap:7px"><button class="btn" onclick="openEditWk('${w.id}')" style="font-size:0.85em">✏ 수정</button><button class="btn red-btn" onclick="delWk('${w.id}')" style="font-size:0.85em">🗑</button></div></div>`;}).join("")}
  </div>`;}

window.openAddWk=()=>{showOv(`<div class="modal"><div class="mtitle">담당자 추가</div><div class="fg"><label class="fl">이름</label><input class="fi" id="nw-nm" placeholder="담당자 이름"></div><div class="fg"><label class="fl">담당 공정</label><select class="fi" id="nw-st">${STEPS.map((s,i)=>`<option value="${i}">${s}</option>`).join("")}</select></div><div class="fg"><label class="fl">PIN (숫자 4자리)</label><input class="fi" id="nw-pi" type="number" placeholder="예: 1234"></div><div class="err-msg" id="nw-e"></div><div class="mfoot"><button class="btn" onclick="closeOv()">취소</button><button class="btn gold" onclick="subAddWk()">+ 추가</button></div></div>`);}
window.subAddWk=()=>{const nm=document.getElementById("nw-nm").value.trim(),si=parseInt(document.getElementById("nw-st").value),pi=document.getElementById("nw-pi").value.trim(),e=document.getElementById("nw-e");if(!nm){e.textContent="이름을 입력하세요.";return;}if(!/^\d{4}$/.test(pi)){e.textContent="PIN은 숫자 4자리여야 합니다.";return;}const uid="w"+Date.now();saveUser(uid,{id:uid,name:nm,role:"worker",pin:pi,stepIdx:si});closeOv();}
window.openEditWk=(uid)=>{const w=users[uid];if(!w)return;showOv(`<div class="modal"><div class="mtitle">담당자 수정 — ${w.name}</div><div class="fg"><label class="fl">이름</label><input class="fi" id="ew-nm" value="${w.name}"></div><div class="fg"><label class="fl">담당 공정</label><select class="fi" id="ew-st">${STEPS.map((s,i)=>`<option value="${i}" ${i===w.stepIdx?"selected":""}>${s}</option>`).join("")}</select></div><div class="fg"><label class="fl">새 PIN (변경 시만 입력)</label><input class="fi" id="ew-pi" type="number" placeholder="비워두면 유지"></div><div class="err-msg" id="ew-e"></div><div class="mfoot"><button class="btn" onclick="closeOv()">취소</button><button class="btn gold" onclick="subEditWk('${uid}')">✓ 저장</button></div></div>`);}
window.subEditWk=(uid)=>{const w=users[uid];if(!w)return;const nm=document.getElementById("ew-nm").value.trim(),si=parseInt(document.getElementById("ew-st").value),pi=document.getElementById("ew-pi").value.trim(),e=document.getElementById("ew-e");if(!nm){e.textContent="이름을 입력하세요.";return;}if(pi&&!/^\d{4}$/.test(pi)){e.textContent="PIN은 숫자 4자리여야 합니다.";return;}saveUser(uid,{...w,name:nm,stepIdx:si,pin:pi||w.pin});closeOv();}
window.delWk=(uid)=>{if(!confirm("삭제하시겠습니까?"))return;clearSession(uid);deleteUser(uid);}

function showOv(html){const a=document.getElementById("ov");if(a)a.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeOv()"><div>${html}</div></div>`;}
window.closeOv=()=>{const a=document.getElementById("ov");if(a)a.innerHTML="";}
window.renderList=renderList;window.renderUsers=renderUsers;window.renderSettings=renderSettings;
</script>
</body>
</html>
