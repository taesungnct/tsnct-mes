<!DOCTYPE html>
<html lang="ko" class="fs-medium">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>태성NCT 생산관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html.fs-small{font-size:13px}
html.fs-medium{font-size:16px}
html.fs-large{font-size:19px}
html.fs-xlarge{font-size:22px}

:root{
  --bg-page:#f7f5f2;--bg-card:#ffffff;--bg-card2:#fbfaf7;--bg-soft:#f1ede7;--bg-track:#ece6d9;
  --text-main:#2b2620;--text-sub:#5a5448;--text-mute:#8a8275;--text-faint:#b3ac9d;
  --border:#e8e2d6;--border-strong:#d8d2c4;
  --gold:#C8941E;--gold-dark:#7A4A12;--gold-bg:#FFF6E5;--gold-border:#E0A93A;
  --blue:#1A5FA8;--blue-bg:#E3EEFA;--blue-border:#5B9BD5;
  --green:#2E7D32;--green-bg:#E5F3E0;--green-border:#9CCB8A;
  --red:#C62828;--red-bg:#FBE4E4;
  --purple:#5E4FA8;--purple-bg:#EDE9F8;
  --shadow:0 1px 4px rgba(0,0,0,0.03);
  --shadow-lg:0 4px 24px rgba(0,0,0,0.06);
  --overlay-bg:rgba(40,32,18,0.45);
}
body.theme-dark{
  --bg-page:#0f0f0f;--bg-card:#1a1a1a;--bg-card2:#1e1e1e;--bg-soft:#222222;--bg-track:#2a2a2a;
  --text-main:#f0f0f0;--text-sub:#cccccc;--text-mute:#999999;--text-faint:#666666;
  --border:#2a2a2a;--border-strong:#3a3a3a;
  --gold:#F5A800;--gold-dark:#F5A800;--gold-bg:#3a2000;--gold-border:#F5A800;
  --blue:#7EC8E3;--blue-bg:#1a3a5c;--blue-border:#378ADD;
  --green:#6FCF6F;--green-bg:#1a3a1a;--green-border:#3B6D11;
  --red:#FF8A80;--red-bg:#5c1a1a;
  --purple:#B0A8FF;--purple-bg:#2a2a5c;
  --shadow:0 1px 4px rgba(0,0,0,0.3);
  --shadow-lg:0 8px 30px rgba(0,0,0,0.5);
  --overlay-bg:rgba(0,0,0,0.78);
}
body.theme-dark input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1)}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:inherit;background:var(--bg-page);color:var(--text-main);transition:background 0.2s,color 0.2s}
.header{background:var(--bg-card);border-bottom:3px solid var(--gold);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;flex-wrap:nowrap;box-shadow:var(--shadow)}
.header-logo{width:44px;height:44px;flex-shrink:0;border-radius:8px}
.header-title{font-size:1.3em;font-weight:600;color:var(--gold-dark);line-height:1.2;letter-spacing:0.01em}
.header-sub{font-size:0.75em;color:var(--text-mute);margin-top:2px;letter-spacing:0.05em}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.nav{display:flex;gap:4px;background:var(--bg-soft);border-radius:10px;padding:4px}
.ntab{padding:9px 16px;border-radius:8px;border:none;background:transparent;font-size:0.88em;color:var(--text-mute);cursor:pointer;font-family:inherit;white-space:nowrap;font-weight:500}
.ntab.on{background:var(--gold);color:#fff;font-weight:600}
.uname{font-size:0.88em;color:var(--text-sub);font-weight:500}
.badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:0.75em;font-weight:600}
.b-admin{background:var(--gold);color:#fff}
.b-worker{background:var(--blue-bg);color:var(--blue)}
.b-ongoing{background:var(--blue-bg);color:var(--blue)}
.b-done{background:var(--green-bg);color:var(--green)}
.b-delay{background:var(--red-bg);color:var(--red)}
.b-new{background:var(--purple-bg);color:var(--purple)}
.app{max-width:860px;margin:0 auto;padding:1rem}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem}
@media(min-width:500px){.stats{grid-template-columns:repeat(4,1fr)}}
.scard{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.slabel{font-size:0.82em;color:var(--text-mute);margin-bottom:5px;font-weight:500}
.sval{font-size:2em;font-weight:700}
.sval.gold{color:var(--gold)}.sval.blue{color:var(--blue)}.sval.green{color:var(--green)}.sval.red{color:var(--red)}
.alert-bar{background:var(--gold-bg);border:2px solid var(--gold-border);border-radius:12px;padding:13px 16px;margin-bottom:1rem;font-size:0.95em;color:var(--gold-dark);display:flex;align-items:center;gap:10px;font-weight:500;line-height:1.4}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:6px}
.sh-title{font-size:1.05em;font-weight:700;color:var(--gold-dark)}
.btn{padding:9px 18px;border-radius:10px;border:1px solid var(--border-strong);background:var(--bg-card);font-size:0.88em;cursor:pointer;font-family:inherit;color:var(--text-main);display:inline-flex;align-items:center;gap:6px;touch-action:manipulation;font-weight:500}
.btn:active{opacity:0.7}
.btn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.gold{background:var(--gold);color:#fff;border-color:var(--gold);font-weight:700}
.btn.grn{background:var(--green-bg);color:var(--green);border-color:var(--green-border);font-weight:600}
.btn.red-btn{color:var(--red);border-color:var(--red-bg)}
.btn.big{padding:18px 20px;font-size:1.1em;border-radius:14px;width:100%;justify-content:center;font-weight:700}
.ocard{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:15px 17px;margin-bottom:10px;cursor:pointer;touch-action:manipulation;box-shadow:var(--shadow)}
.ocard:active{opacity:0.8}
.ocard.delay-card{border-left:4px solid var(--red)}
.otop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.oid{font-weight:700;font-size:1.05em;color:var(--gold);line-height:1.3}
.oname{font-size:0.9em;color:var(--text-main);margin-top:3px;font-weight:500}
.oclient{font-size:0.82em;color:var(--text-mute);margin-top:3px}
.pbar{display:flex;gap:3px;align-items:center;flex-wrap:wrap;container-type:inline-size}
.ps{flex:1;min-width:0;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:clamp(7px,2.1cqw,13px);font-weight:600;white-space:nowrap;padding:0 1px}
.ps-d{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.ps-a{background:var(--blue-bg);color:var(--blue);border:2px solid var(--blue-border)}
.ps-p{background:var(--bg-soft);color:var(--text-faint);border:1px solid var(--border)}
.ps-free{background:var(--gold-bg);color:var(--gold-dark);border:2px solid var(--gold-border)}
.ometa{display:flex;gap:10px;margin-top:9px;font-size:0.82em;color:var(--text-mute);flex-wrap:wrap}
.prog-wrap{background:var(--bg-track);border-radius:4px;height:7px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:var(--blue);border-radius:4px}
.prog-fill.done-fill{background:var(--green)}
.divider{height:1px;background:var(--border);margin:1rem 0}
.proc-list{display:flex;flex-direction:column;gap:9px}
.pi{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg-card2)}
.pi.a{border-color:var(--blue-border);background:var(--blue-bg);border-width:2px}
.pi.d{background:var(--bg-soft);opacity:0.75}
.pi.free{border-color:var(--gold-border);background:var(--gold-bg);border-width:2px}
.pico{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1em;flex-shrink:0;margin-top:1px;font-weight:700}
.pico.d{background:var(--green-bg);color:var(--green)}
.pico.a{background:var(--blue-bg);color:var(--blue)}
.pico.p{background:var(--bg-track);color:var(--text-faint)}
.pico.free-i{background:var(--gold-bg);color:var(--gold)}
.pname{font-size:1em;font-weight:600;color:var(--text-main)}
.pworker{font-size:0.82em;color:var(--text-mute);margin-top:3px}
.pnote{font-size:0.82em;color:var(--text-sub);margin-top:5px;padding:6px 10px;background:var(--bg-soft);border-radius:7px}
.pa{display:flex;gap:5px;align-items:center;margin-left:auto;flex-shrink:0}
.ni{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border-strong);font-size:0.88em;font-family:inherit;color:var(--text-main);background:var(--bg-card);margin-top:6px}
.tl-item{display:flex;gap:10px;align-items:flex-start;font-size:0.88em;margin-bottom:9px}
.tl-dot{width:9px;height:9px;border-radius:50%;margin-top:4px;flex-shrink:0}
.tl-dot.d{background:var(--green)}.tl-dot.a{background:var(--blue)}.tl-dot.p{background:var(--border-strong)}
.tl-text{color:var(--text-main);line-height:1.5}
.tl-time{font-size:0.79em;color:var(--text-faint);margin-top:2px}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-row input{flex:1;min-width:0;padding:11px 14px;border-radius:10px;border:1px solid var(--border-strong);background:var(--bg-card);font-size:0.88em;font-family:inherit;color:var(--text-main)}
.search-row input::placeholder{color:var(--text-faint)}
.filter-sel{padding:11px 10px;border-radius:10px;border:1px solid var(--border-strong);background:var(--bg-card);font-size:0.88em;font-family:inherit;color:var(--text-main)}
.empty{text-align:center;padding:3rem 1rem;color:var(--text-faint);font-size:0.88em}
.overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;align-items:flex-start;justify-content:center;padding:1rem 0.75rem;z-index:100;overflow-y:auto}
.modal{background:var(--bg-card);border-radius:14px;padding:1.35rem;width:100%;max-width:520px;border:1px solid var(--border);margin:auto;box-shadow:var(--shadow-lg)}
.mtitle{font-size:1.1em;font-weight:700;margin-bottom:1rem;color:var(--gold-dark)}
.fg{margin-bottom:11px}
.fl{font-size:0.82em;color:var(--text-mute);margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--border-strong);background:var(--bg-card);font-size:0.88em;font-family:inherit;color:var(--text-main)}
.fr{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:var(--bg-page)}
.login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:2rem;width:100%;max-width:390px;box-shadow:var(--shadow-lg)}
.login-logo{width:60px;height:60px;margin-bottom:12px;border-radius:10px}
.login-title{font-size:1.4em;font-weight:700;color:var(--gold-dark);margin-bottom:2px}
.login-sub{font-size:0.82em;color:var(--text-mute);margin-bottom:1.5rem}
.user-row{display:flex;align-items:center;gap:13px;padding:15px 14px;border-radius:12px;border:1px solid var(--border);margin-bottom:9px;cursor:pointer;touch-action:manipulation;background:var(--bg-card2)}
.user-row:active{background:var(--bg-soft)}
.user-row.online{border-color:var(--gold);background:var(--gold-bg)}
.urow-name{font-size:1.05em;font-weight:600;color:var(--text-main)}
.urow-sub{font-size:0.82em;color:var(--text-mute);margin-top:3px}
.pin-dots{display:flex;gap:14px;justify-content:center;margin:1.35rem 0}
.pin-dot{width:17px;height:17px;border-radius:50%;border:2px solid var(--border-strong);background:transparent;transition:all 0.1s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-btn{padding:20px 10px;border-radius:13px;border:1px solid var(--border);background:var(--bg-card2);font-size:1.6em;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-main);touch-action:manipulation}
.pin-btn:active{background:var(--bg-soft)}
.err-msg{font-size:0.82em;color:var(--red);text-align:center;margin-top:8px;min-height:20px}
.complete-zone{background:var(--green-bg);border:2px solid var(--green-border);border-radius:14px;padding:1.1rem;margin-bottom:1rem}
.complete-zone-title{font-size:0.95em;font-weight:700;color:var(--green);margin-bottom:11px}
.free-zone{background:var(--gold-bg);border:2px solid var(--gold-border);border-radius:14px;padding:1.1rem;margin-bottom:1rem}
.free-zone-title{font-size:0.95em;font-weight:700;color:var(--gold-dark);margin-bottom:11px}
.work-card{background:var(--bg-card);border-radius:11px;border:1px solid var(--border);padding:14px 15px;margin-bottom:9px;box-shadow:var(--shadow)}
.user-mgmt-row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:11px;border:1px solid var(--border);margin-bottom:9px;background:var(--bg-card2)}
.section-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:15px 17px;margin-bottom:1rem;box-shadow:var(--shadow)}
.sc-title{font-size:0.79em;font-weight:700;color:var(--gold);margin-bottom:13px;text-transform:uppercase;letter-spacing:0.07em}
.prog-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.pb-label{width:70px;font-size:0.82em;color:var(--text-mute);flex-shrink:0;font-weight:500}
.pb-track{flex:1;background:var(--bg-track);border-radius:4px;height:9px;overflow:hidden}
.pb-fill{height:100%;border-radius:4px;background:var(--blue)}
.pb-fill.pf-done{background:var(--green)}
.pb-count{font-size:0.79em;color:var(--text-mute);width:80px;text-align:right;flex-shrink:0}
.fs-btn{padding:11px 20px;border-radius:10px;border:1px solid var(--border-strong);background:var(--bg-card2);font-size:0.9em;cursor:pointer;font-family:inherit;color:var(--text-main);font-weight:500}
.fs-btn.active{background:var(--gold);color:#fff;border-color:var(--gold);font-weight:700}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;background:var(--bg-page)}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(min-width:700px){
  .client-grid{grid-template-columns:repeat(1,1fr) !important}
}
@media(max-width:699px){
  .client-grid{grid-template-columns:repeat(1,1fr) !important}
}

@media(max-width:600px){
  .header{padding:8px 12px;gap:6px}
  .header-logo{width:32px;height:32px}
  .header-title{font-size:1em}
  .header-sub{display:none}
  .nav .ntab{padding:5px 7px;font-size:0.75em}
  .uname{font-size:0.82em}
}

.login-right{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.login-right-bg{position:absolute;inset:0;background:
  repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(200,148,30,0.04) 40px,rgba(200,148,30,0.04) 41px),
  repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(200,148,30,0.04) 40px,rgba(200,148,30,0.04) 41px),
  radial-gradient(ellipse at 30% 50%,rgba(200,148,30,0.10) 0%,transparent 60%),
  radial-gradient(ellipse at 80% 20%,rgba(26,95,168,0.06) 0%,transparent 50%),
  linear-gradient(135deg,var(--bg-card2) 0%,var(--bg-soft) 50%,var(--bg-card2) 100%)}
.login-right-content{position:relative;z-index:1;text-align:center;padding:2rem}
.login-right-icon{font-size:5em;opacity:0.15;margin-bottom:1.5rem;display:block}
.login-right-title{font-size:2em;color:rgba(122,74,18,0.4);margin-bottom:1rem;letter-spacing:0.1em}
.login-right-steps{display:flex;flex-direction:column;gap:18px;margin-top:2rem}
.login-right-step{display:flex;align-items:center;gap:16px;opacity:0.3}
.login-right-step-num{width:36px;height:36px;border-radius:50%;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:0.9em;color:var(--gold);flex-shrink:0}
.login-right-step-text{text-align:left}
.login-right-step-label{font-size:0.85em;color:var(--gold)}
.login-right-step-sub{font-size:0.75em;color:var(--text-mute);margin-top:2px}
@media(max-width:700px){.login-right{display:none}.login-card{max-width:100%;border-radius:0}}

.theme-toggle-row{display:flex;gap:10px;flex-wrap:wrap}
.theme-btn{flex:1;min-width:120px;padding:14px;border-radius:12px;border:2px solid var(--border-strong);background:var(--bg-card2);cursor:pointer;font-family:inherit;color:var(--text-main);font-size:0.92em;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
.theme-btn.active{border-color:var(--gold);background:var(--gold-bg);color:var(--gold-dark)}
</style>
</head>

function nowParts(){

}

window.wSendBack=(oid,si)=>{
  if(si<=0)return;
  if(!confirm(`이 작업을 ${STEPS[si-1]} 단계로 돌려보내시겠습니까?`))return;
  const key=getOrderKey(oid);const o=orders[key];if(!o)return;
  const u={...o,steps:[...o.steps],history:[...(o.history||[])]};
  u.steps[si]=0;
  u.steps[si-1]=1;
  u.history.push({t:td(),msg:`${STEPS[si]}에서 ${STEPS[si-1]}로 반려 (${wName()})`});
  saveOrder(key,u);
}

window.wComplete=(oid,si)=>{const key=getOrderKey(oid);const o=orders[key];if(!o||o.steps[si]!==1)return;const u={...o,steps:[...o.steps],history:[...(o.history||[])],completedWorkers:{...(o.completedWorkers||{})}};u.steps[si]=2;u.completedWorkers[si]=wName();u.history.push({t:td(),msg:`${STEPS[si]} 완료 (${wName()})`});if(si+1<STEPS.length){u.steps[si+1]=1;u.history.push({t:td(),msg:`${STEPS[si+1]} 시작`});}saveOrder(key,u);}

function renderCalendar(oList){
  const isDark=document.body.classList.contains("theme-dark");
  const now=new Date(Date.now()+9*3600*1000);
  let y=now.getUTCFullYear(),mo=now.getUTCMonth()+calMonthOffset;
  y+=Math.floor(mo/12);mo=((mo%12)+12)%12;
  const firstDay=new Date(Date.UTC(y,mo,1));
  const startWeekday=firstDay.getUTCDay();
  const daysInMonth=new Date(Date.UTC(y,mo+1,0)).getUTCDate();
  const todayStr=td();
  const byDate={};
  oList.forEach(o=>{
    if(!o.due)return;
    const d=o.due;
    if(!byDate[d])byDate[d]=[];
    byDate[d].push(o);
  });
  const monthLabel=`${y}년 ${mo+1}월`;
  const weekNames=["일","월","화","수","목","금","토"];
  const cells=[];
  for(let i=0;i<startWeekday;i++)cells.push(null);
  for(let day=1;day<=daysInMonth;day++)cells.push(day);
  while(cells.length%7!==0)cells.push(null);
  const rows=[];
  for(let i=0;i<cells.length;i+=7)rows.push(cells.slice(i,i+7));
  const cellHtml=(day,wd)=>{
    if(day===null)return `<div style="min-height:84px;background:var(--bg-page);border-radius:8px"></div>`;
    const dateStr=`${y}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const isToday=dateStr===todayStr;
    const items=byDate[dateStr]||[];
    const wdColor=wd===0?(isDark?"#FF8A80":"#C62828"):wd===6?(isDark?"#7EC8E3":"#1A5FA8"):"var(--text-main)";
    return `<div style="min-height:84px;background:${isToday?"var(--gold-bg)":"var(--bg-card2)"};border:1px solid ${isToday?"var(--gold)":"var(--border)"};border-radius:8px;padding:6px;display:flex;flex-direction:column;gap:3px;overflow:hidden">
      <div style="font-size:0.78em;font-weight:700;color:${wdColor}">${day}</div>
      ${items.slice(0,3).map(o=>{
        const st=gSt(o);
        const dotColor=st==="delay"?(isDark?"#FF8A80":"#C62828"):st==="done"?(isDark?"#6FCF6F":"#2E7D32"):o.outsource?(isDark?"#B0A8FF":"#5E4FA8"):(isDark?"#7EC8E3":"#1A5FA8");
        return `<div onclick="openDetail('${o.id}')" style="cursor:pointer;font-size:0.7em;background:${dotColor}22;color:${dotColor};border-radius:4px;padding:1px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${o.client} / ${o.name}">${o.client}</div>`;
      }).join("")}
      ${items.length>3?`<div style="font-size:0.68em;color:var(--text-mute)">+${items.length-3}건</div>`:""}
    </div>`;
  };
  return `
  <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px">
    <button class="btn" style="padding:6px 12px" onclick="shiftCalMonth(-1)">‹</button>
    <div style="font-size:1.1em;font-weight:700;color:var(--text-main);min-width:120px;text-align:center">${monthLabel}</div>
    <button class="btn" style="padding:6px 12px" onclick="shiftCalMonth(1)">›</button>
    ${calMonthOffset!==0?`<button class="btn" style="padding:6px 12px;font-size:0.82em" onclick="calMonthOffset=0;render()">오늘</button>`:""}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
    ${weekNames.map((w,i)=>`<div style="text-align:center;font-size:0.78em;color:${i===0?(isDark?"#FF8A80":"#C62828"):i===6?(isDark?"#7EC8E3":"#1A5FA8"):"var(--text-mute)"};padding:4px 0">${w}</div>`).join("")}
  </div>
  ${rows.map(row=>`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">${row.map((day,i)=>cellHtml(day,i)).join("")}</div>`).join("")}
  `;
}

  </div>
  ${o.outsource?`<div style="display:flex;justify-content:center;align-items:center;height:28px"><span style="font-size:0.82em;font-weight:700;color:var(--purple);background:var(--purple-bg);padding:4px 18px;border-radius:8px">외주</span></div>`:`<div class="pbar">${STEPS.map((s,i)=>{const c=o.steps&&o.steps[i]===2?"ps-d":o.steps&&o.steps[i]===1?(i===FREE_STEP?"ps-free":"ps-a"):"ps-p";const nt=noteText(o.notes&&o.notes[i]);return`<div class="ps ${c}" title="${s}${nt?" — 📝 "+nt:""}" style="position:relative">${s}${nt?'<span style="position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:var(--gold)"></span>':""}</div>`;}).join('<span style="font-size:0.55em;color:var(--text-faint)">›</span>')}</div>`}
  <div style="margin-top:8px"><div class="prog-wrap"><div class="prog-fill ${pct(o)===100?"done-fill":""}" style="width:${pct(o)}%"></div></div></div>
  <div class="ometa"><span>${o.qty}개</span><span>${shipped?shipDate+" 완료":"납기 "+o.due+" "+ddayText(d)}</span><span>${curStep(o)}</span><span>${pct(o)}%</span></div>
</div>`;}

window.openDetail=(id)=>{
  const o=Object.values(orders).find(x=>x.id===id);if(!o)return;
  openDetailId=id;
  const st=gSt(o);
  const shipped=o.steps&&o.steps[6]===2;
  let shipDate=o.due;
  if(shipped&&o.history){
    const h=o.history.filter(x=>x.msg&&x.msg.includes("출하")&&x.msg.includes("완료")).pop();
    if(h)shipDate=h.t;
  }
  showOv(`<div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">
      <div><div style="font-size:1.15em;font-weight:400;color:var(--gold)">${o.id}</div><div style="font-size:0.9em;color:var(--text-sub);margin-top:3px">${o.name}</div><div style="font-size:0.82em;color:var(--text-mute);margin-top:3px">${o.client} · ${o.qty}개</div></div>
      <button class="btn" onclick="closeOv()" style="padding:5px 11px;font-size:1em">✕</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <span class="badge ${stC[st]}">${stL[st]}</span>
      ${shipped?`<span style="font-size:0.82em;color:var(--green)">${shipDate} 납품완료</span>`:`<span style="font-size:0.82em;color:var(--text-mute)">납기 ${o.due} <span style="font-weight:700;color:${dueColor(dl(o.due))}">${ddayText(dl(o.due))}</span></span>`}
      ${o.post?`<span style="font-size:0.82em;color:var(--text-mute)">후가공: ${o.post}</span>`:""}
      ${o.coat?`<span style="font-size:0.82em;color:var(--text-mute)">도장: ${o.coat}</span>`:""}
    </div>
    <div style="margin-bottom:10px"><div class="prog-wrap" style="height:9px"><div class="prog-fill ${pct(o)===100?"done-fill":""}" style="width:${pct(o)}%"></div></div><div style="font-size:0.82em;color:var(--text-mute);margin-top:4px">${pct(o)}% 완료</div></div>
    <div class="divider"></div>
    <div style="font-size:0.9em;font-weight:400;color:var(--gold);margin-bottom:10px">공정 진행</div>
    <div class="proc-list">${renderPL(o)}</div>
    <div class="divider"></div>
    <div style="font-size:0.9em;font-weight:400;color:var(--gold);margin-bottom:10px">진행 이력</div>
    <div>${(o.history||[]).slice().reverse().map(h=>`<div class="tl-item"><div class="tl-dot ${h.msg.includes("시작")?"a":h.msg.includes("완료")||h.msg.includes("납품")?"d":"p"}"></div><div><div class="tl-text">${h.msg}</div><div class="tl-time">${h.t}</div></div></div>`).join("")}</div>
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between">
      ${isAdmin()?`<button class="btn red-btn" onclick="delOrderUI('${o.id}')">🗑 삭제</button>`:'<div></div>'}
      <div style="display:flex;gap:8px">${isAdmin()?`<button class="btn" onclick="openEdit('${o.id}')">✏ 수정</button>`:''}<button class="btn" onclick="closeOv()">닫기</button></div>
    </div>
  </div>`);}

function getCompletedBy(o,i){
  if(!o.history)return null;
  const re=new RegExp(`^${STEPS[i].replace("/","\\/")} 완료 \\((.+)\\)$`);
  for(let h of o.history){
    const m=h.msg&&h.msg.match(re);
    if(m)return m[1];
  }
  return null;
}

function renderPL(o){
  const visibleSteps=o.outsource?[0,6]:STEPS.map((_,i)=>i);
  return visibleSteps.map(i=>{
  const s=STEPS[i];
  const sv=o.steps?o.steps[i]:0,ic=sv===2?"d":sv===1?"a":"p",piC=sv===2?"d":sv===1?"a":"",wk=(o.workers&&o.workers[i])||"미지정",isFree=i===FREE_STEP;
  const adminOnly=isAdmin();
  const completedBy=sv===2?getCompletedBy(o,i):null;
  const noteRaw=o.notes&&o.notes[i];
  const noteTxt=noteText(noteRaw);
  const canEdit=canEditNote(noteRaw);
  const isOpen=openNoteKeys.has(o.id+"-"+i);
  return`<div class="pi ${piC} ${isFree&&sv===1?"free":""}">
    <div class="pico ${isFree&&sv===1?"free-i":ic}">${sv===2?"✓":sv===1?(isFree?"🔧":"▶"):(i+1)}</div>
    <div style="flex:1;min-width:0">
      <div class="pname">${s}</div>
      ${sv===2?`<div class="pworker" style="color:var(--green)">완료: ${completedBy||"미확인"}</div>`:!isFree?(adminOnly?`<div class="pworker">담당: <select style="font-size:0.82em;border:none;background:transparent;font-family:inherit;color:var(--text-mute);cursor:pointer" onchange="setWk('${o.id}',${i},this.value)"><option value="미지정" ${wk==="미지정"?"selected":""}>미지정</option><option value="외주" ${wk==="외주"?"selected":""}>외주</option>${wNames().map(w=>`<option value="${w}" ${w===wk?"selected":""}>${w}</option>`).join("")}</select></div>`:`<div class="pworker">담당: ${wk}</div>`):""}
      ${noteTxt&&!isOpen?`<div class="pnote" style="cursor:${canEdit?"pointer":"default"}" ${canEdit?`onclick="togN('${o.id}',${i})"`:""}>📝 ${noteTxt}</div>`:""}
      <div id="ni-wrap-${o.id}-${i}" style="display:${isOpen?"flex":"none"};gap:6px;margin-top:6px"><input class="ni" id="ni-${o.id}-${i}" placeholder="메모 입력..." value="${noteTxt}" onkeydown="if(event.key==='Enter')confirmN('${o.id}',${i})" style="flex:1"><button class="btn pri" style="padding:6px 12px;font-size:0.85em" onclick="confirmN('${o.id}',${i})">확인</button></div>
    </div>
    <div class="pa">
      ${sv===2?`<span style="font-size:0.88em;color:var(--green);font-weight:400">완료</span>`:sv===1?`<span style="font-size:0.88em;color:var(--blue);font-weight:400">진행중</span>`:`<span style="font-size:0.88em;color:var(--text-faint)">대기</span>`}
      ${adminOnly&&sv===1?`<button class="btn pri" style="padding:8px 13px;font-size:0.88em" onclick="adv('${o.id}',${i})">완료</button>`:""}
      ${!noteTxt||canEdit?`<button class="btn" style="padding:7px 10px" onclick="togN('${o.id}',${i})">✏</button>`:""}
    </div>
  </div>`;}).join("");}



window.adv=(id,i)=>{const key=getOrderKey(id);const o=orders[key];if(!o)return;const u={...o,steps:[...(o.steps||STEPS.map(()=>0))],history:[...(o.history||[])],completedWorkers:{...(o.completedWorkers||{})}};if(u.steps[i]===0){const p=u.steps.findIndex(s=>s===1);if(p>=0&&p!==i)return;u.steps[i]=1;u.history.push({t:td(),msg:`${STEPS[i]} 시작 (관리자)`});}else if(u.steps[i]===1){u.steps[i]=2;u.completedWorkers[i]=(o.workers&&o.workers[i])||"미지정";u.history.push({t:td(),msg:`${STEPS[i]} 완료 (관리자)`});const next=o.outsource&&i===0?6:i+1;if(next<STEPS.length&&u.steps[next]!==2){u.steps[next]=1;u.history.push({t:td(),msg:`${STEPS[next]} 시작`});}}saveOrder(key,u);}
window.setWk=(id,i,v)=>{const key=getOrderKey(id);const o=orders[key];if(!o)return;const u={...o,workers:[...(o.workers||STEPS.map(()=>"미지정"))]};u.workers[i]=v;saveOrder(key,u);}
window.saveN=(id,i,v)=>{const key=getOrderKey(id);const o=orders[key];if(!o)return;const notes=[...(o.notes||STEPS.map(()=>""))];const prev=notes[i];const prevAuthor=prev&&typeof prev==="object"?prev.author:null;notes[i]=v?{text:v,author:prevAuthor||wOrAdminName()}:"";saveOrder(key,{...o,notes});}
function wOrAdminName(){return isAdmin()?"관리자":wName();}
function noteText(n){return n&&typeof n==="object"?n.text:(n||"");}
function noteAuthor(n){return n&&typeof n==="object"?n.author:null;}
function canEditNote(n){if(isAdmin())return true;const a=noteAuthor(n);if(!a)return false;return a===wName();}
window.confirmN=(id,i)=>{const inp=document.getElementById(`ni-${id}-${i}`);const v=inp?inp.value:"";saveN(id,i,v);openNoteKeys.delete(id+"-"+i);openDetail(id);}
window.togN=(id,i)=>{
  const o=orders[getOrderKey(id)];if(!o)return;
  const existing=o.notes&&o.notes[i];
  if(existing&&!canEditNote(existing))return;
  const k=id+"-"+i;if(openNoteKeys.has(k))openNoteKeys.delete(k);else openNoteKeys.add(k);openDetail(id);
}
window.delOrderUI=(id)=>{if(!confirm("삭제하시겠습니까?"))return;const key=getOrderKey(id);deleteOrder(key);closeOv();}

window.openAdd=()=>{
  const drawers=wList().filter(w=>w.stepIdx===0);
  const lockedWk=(!isAdmin()&&sess&&sess.stepIdx===0)?sess.name:null;
  const wkField=lockedWk
    ?`<input class="fi" id="ai-wk" value="${lockedWk}" disabled style="opacity:0.7">`
    :`<select class="fi" id="ai-wk">${drawers.map(w=>`<option>${w.name}</option>`).join("")}</select>`;
  const knownClients=[...new Set(Object.values(orders).map(o=>o.client).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  showOv(`<div class="modal">
  <div class="mtitle">수주 등록</div>
  <div class="fg" style="position:relative">
    <label class="fl">거래처</label>
    <div style="display:flex;gap:6px">
      <input class="fi" id="ai-cl" placeholder="거래처명" style="flex:1" oninput="document.getElementById('ai-cl-list').style.display='none'">
      <button type="button" class="btn" style="padding:0 14px" onclick="toggleClientList()">▼</button>
    </div>
    <div id="ai-cl-list" style="display:none;position:absolute;top:100%;left:0;right:46px;max-height:200px;overflow-y:auto;background:var(--bg-card);border:1px solid var(--border-strong);border-radius:10px;margin-top:4px;z-index:20;box-shadow:var(--shadow)">
      ${knownClients.length?knownClients.map(c=>`<div style="padding:10px 14px;cursor:pointer;font-size:0.92em;color:var(--text-main)" onmousedown="selectClient('${c.replace(/'/g,"\\'")}')">${c}</div>`).join(""):`<div style="padding:10px 14px;font-size:0.88em;color:var(--text-mute)">등록된 거래처가 없습니다</div>`}
    </div>
  </div>
  <div class="fg"><label class="fl">품명</label><input class="fi" id="ai-nm" placeholder="품명 또는 설명"></div>
  <div class="fg"><label class="fl">납기일</label><input class="fi" id="ai-du" type="date" value="${td()}"></div>
  <div class="fg" style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="ai-os" style="width:18px;height:18px;cursor:pointer"><label for="ai-os" style="cursor:pointer;font-size:0.92em;color:var(--text-main)">외주</label></div>
  <div class="fg" id="ai-wk-wrap"><label class="fl">도면작업 담당자</label>${wkField}${lockedWk?`<input type="hidden" id="ai-wk-locked" value="${lockedWk}">`:""}</div>
  <div class="mfoot"><button class="btn" onclick="closeOv()">취소</button><button class="btn gold" onclick="subAdd()">+ 등록</button></div>
</div>`);}

window.toggleClientList=()=>{const el=document.getElementById("ai-cl-list");if(!el)return;el.style.display=el.style.display==="none"?"block":"none";}
window.selectClient=(name)=>{const inp=document.getElementById("ai-cl");if(inp)inp.value=name;const list=document.getElementById("ai-cl-list");if(list)list.style.display="none";}

window.subAdd=()=>{const cl=document.getElementById("ai-cl").value.trim(),nm=document.getElementById("ai-nm").value.trim(),du=document.getElementById("ai-du").value;const lockedEl=document.getElementById("ai-wk-locked");const wk=lockedEl?lockedEl.value:document.getElementById("ai-wk").value;const os=document.getElementById("ai-os").checked;if(!cl||!nm){alert("거래처, 품명은 필수입니다.");return;}const id=nextId();const key="order_"+Date.now();set(ref(db,`orders/${key}`),{id,client:cl,name:nm,qty:1,due:du,post:"",coat:"",outsource:os,steps:[1,0,0,0,0,0,0],notes:["","","","","","",""],workers:[wk,"미지정","미지정","미지정","미지정","미지정","미지정"],created:td(),history:[{t:td(),msg:"수주 등록"}]});closeOv();}

window.openEdit=(id)=>{const o=Object.values(orders).find(x=>x.id===id);if(!o)return;closeOv();const curWk=(o.workers&&o.workers[0])||"미지정";setTimeout(()=>showOv(`<div class="modal">
  <div class="mtitle">수주 수정 — ${o.id}</div>
  <div class="fr"><div class="fg"><label class="fl">거래처</label><input class="fi" id="ei-cl" value="${o.client||""}"></div><div class="fg"><label class="fl">품명</label><input class="fi" id="ei-nm" value="${o.name||""}"></div></div>
  <div class="fr"><div class="fg"><label class="fl">수량</label><input class="fi" id="ei-qt" type="number" value="${o.qty||1}"></div><div class="fg"><label class="fl">납기일</label><input class="fi" id="ei-du" type="date" value="${o.due||""}"></div></div>
  <div class="fr"><div class="fg"><label class="fl">후가공</label><input class="fi" id="ei-po" value="${o.post||""}"></div><div class="fg"><label class="fl">도장/도금</label><input class="fi" id="ei-co" value="${o.coat||""}"></div></div>
  <div class="fg"><label class="fl">도면작업 담당자</label><select class="fi" id="ei-wk"><option value="미지정" ${curWk==="미지정"?"selected":""}>미지정</option>${wList().filter(w=>w.stepIdx===0).map(w=>`<option ${curWk===w.name?"selected":""}>${w.name}</option>`).join("")}</select></div>
  <div class="mfoot"><button class="btn" onclick="closeOv()">취소</button><button class="btn gold" onclick="subEdit('${o.id}')">✓ 저장</button></div>
</div>`),50);}

window.subEdit=(id)=>{
  const key=getOrderKey(id);const o=orders[key];if(!o)return;
  const workers=[...(o.workers||STEPS.map(()=>"미지정"))];
  workers[0]=document.getElementById("ei-wk").value;
  saveOrder(key,{...o,client:document.getElementById("ei-cl").value.trim()||o.client,name:document.getElementById("ei-nm").value.trim()||o.name,qty:parseInt(document.getElementById("ei-qt").value)||o.qty,due:document.getElementById("ei-du").value||o.due,post:document.getElementById("ei-po").value.trim(),coat:document.getElementById("ei-co").value.trim(),workers});
  closeOv();
}

function renderUsers(){const ws=wList();document.getElementById("v-main").innerHTML=`
  <div class="sh"><div class="sh-title">계정 관리</div><div style="display:flex;gap:7px"><button class="btn gold" onclick="openAddWk()">+ 담당자 추가</button></div></div>
  <div class="section-card"><div class="sc-title">관리자</div><div class="user-mgmt-row"><div style="flex:1"><div style="font-size:1.05em;font-weight:400">관리자</div><div style="font-size:0.82em;color:var(--text-mute);margin-top:3px">ID: admin · 전체 권한 · 중복 로그인 허용</div></div></div></div>
  <div class="section-card"><div class="sc-title">공정 담당자 (${ws.length}명)</div>
  ${ws.map(w=>{const on=isOnline(w.id);return`<div class="user-mgmt-row"><div style="flex:1"><div style="font-size:1.05em;font-weight:400;display:flex;align-items:center;gap:8px">${w.name}${on?` <span style="font-size:0.7em;color:var(--gold);background:var(--gold-bg);padding:2px 8px;border-radius:10px">접속중</span>`:""}</div><div style="font-size:0.82em;color:var(--text-mute);margin-top:3px">${STEPS[w.stepIdx]} 담당 · PIN: ${"●".repeat(w.pin.length)}</div></div><div style="display:flex;gap:7px">${on?`<button class="btn" onclick="forceLogoutWk('${w.id}')" style="font-size:0.85em">⏻ 로그아웃</button>`:""}<button class="btn" onclick="openEditWk('${w.id}')" style="font-size:0.85em">✏ 수정</button><button class="btn red-btn" onclick="delWk('${w.id}')" style="font-size:0.85em">🗑</button></div></div>`;}).join("")}
  </div>`;}

window.forceLogoutWk=(uid)=>{
  if(!confirm("이 담당자를 강제 로그아웃 하시겠습니까?"))return;
  clearSession(uid);
}

window.cleanupOutsourceSteps=()=>{
  const targets=Object.entries(orders).filter(([k,o])=>o.outsource&&o.steps&&o.steps.slice(1,6).some(s=>s!==0));
  if(targets.length===0){alert("정리할 외주 수주가 없습니다.");return;}
  if(!confirm(`외주 수주 ${targets.length}건의 중간 공정(레이저~도장/도금) 기록을 초기화합니다. 도면작업·출하 상태는 유지됩니다. 계속하시겠습니까?`))return;
  targets.forEach(([key,o])=>{
    const steps=[...o.steps];
    for(let k=1;k<6;k++)steps[k]=0;
    if(steps[0]===2&&steps[6]!==2)steps[6]=1;
    saveOrder(key,{...o,steps});
  });
  alert("정리가 완료되었습니다.");
}

window.openAddWk=()=>{showOv(`<div class="modal"><div class="mtitle">담당자 추가</div><div class="fg"><label class="fl">이름</label><input class="fi" id="nw-nm" placeholder="담당자 이름"></div><div class="fg"><label class="fl">담당 공정</label><select class="fi" id="nw-st">${STEPS.map((s,i)=>`<option value="${i}">${s}</option>`).join("")}</select></div><div class="fg"><label class="fl">PIN (숫자 4자리)</label><input class="fi" id="nw-pi" type="number" placeholder="예: 1234"></div><div class="err-msg" id="nw-e"></div><div class="mfoot"><button class="btn" onclick="closeOv()">취소</button><button class="btn gold" onclick="subAddWk()">+ 추가</button></div></div>`);}
window.subAddWk=()=>{const nm=document.getElementById("nw-nm").value.trim(),si=parseInt(document.getElementById("nw-st").value),pi=document.getElementById("nw-pi").value.trim(),e=document.getElementById("nw-e");if(!nm){e.textContent="이름을 입력하세요.";return;}if(!/^\d{4}$/.test(pi)){e.textContent="PIN은 숫자 4자리여야 합니다.";return;}const uid="w"+Date.now();const userObj={id:uid,name:nm,role:"worker",pin:pi,stepIdx:si,canRegister:true};saveUser(uid,userObj);closeOv();}
window.openEditWk=(uid)=>{const w=users[uid];if(!w)return;showOv(`<div class="modal"><div class="mtitle">담당자 수정 — ${w.name}</div><div class="fg"><label class="fl">이름</label><input class="fi" id="ew-nm" value="${w.name}"></div><div class="fg"><label class="fl">담당 공정</label><select class="fi" id="ew-st">${STEPS.map((s,i)=>`<option value="${i}" ${i===w.stepIdx?"selected":""}>${s}</option>`).join("")}</select></div><div class="fg"><label class="fl">새 PIN (변경 시만 입력)</label><input class="fi" id="ew-pi" type="number" placeholder="비워두면 유지"></div><div class="err-msg" id="ew-e"></div><div class="mfoot"><button class="btn" onclick="closeOv()">취소</button><button class="btn gold" onclick="subEditWk('${uid}')">✓ 저장</button></div></div>`);}
window.subEditWk=(uid)=>{const w=users[uid];if(!w)return;const nm=document.getElementById("ew-nm").value.trim(),si=parseInt(document.getElementById("ew-st").value),pi=document.getElementById("ew-pi").value.trim(),e=document.getElementById("ew-e");if(!nm){e.textContent="이름을 입력하세요.";return;}if(pi&&!/^\d{4}$/.test(pi)){e.textContent="PIN은 숫자 4자리여야 합니다.";return;}const updated={...w,name:nm,stepIdx:si,pin:pi||w.pin,canRegister:true};saveUser(uid,updated);closeOv();}
window.delWk=(uid)=>{if(!confirm("삭제하시겠습니까?"))return;clearSession(uid);deleteUser(uid);}

function showOv(html){const a=document.getElementById("ov");if(a)a.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeOv()"><div>${html}</div></div>`;}
window.closeOv=()=>{openDetailId=null;const a=document.getElementById("ov");if(a)a.innerHTML="";}
window.renderList=renderList;window.renderUsers=renderUsers;window.renderSettings=renderSettings;
</script>
</body>
</html>
